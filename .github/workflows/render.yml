name: Render Video Pipeline

on:
  workflow_dispatch: # لتشغيل الرندر يدوياً من واجهة GitHub

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install
          # تثبيت المكتبات اللازمة لتشغيل المتصفح على بيئة Linux
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2
        
      - name: Run Render Script
        run: node render.js
        
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: Ofoq-Mediabunny-Render.mp4
          tag_name: v1.0.0 # تأكد من تغييرها أو جعلها ديناميكية
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
